# Bifröst — Wayfile's signature dark theme.
# "Wayfile Unified" obsidian + gold skin (hi-fi design handoff, 2026-06).
# Deep obsidian surfaces with a warm gate-glow gold accent.
#
# The semantic tokens (base/mantle/crust/surface/overlay/text/...) are aliased
# to the obsidian/gold token layer below so every existing component renders
# coherently dark; new components consume the explicit handoff tokens directly.
[colors]
# Semantic tokens — aliased onto the obsidian surfaces + gold accent.
base = "#111217"      # panel / main content surface
mantle = "#0c0d11"    # darker chrome (sidebar)
crust = "#050609"     # deepest page background
surface = "#1b1d24"   # raised surface
overlay = "#22242c"   # highest raised surface
text = "#ECE7DC"
subtext = "#9CA0A8"
muted = "#62666e"
accent = "#E3A94B"    # = gold
success = "#7ab87a"
warning = "#c9956a"
error = "#c97070"
purple = "#b89be0"

# ── "Wayfile Unified" obsidian + gold token layer ─────────────────
# Gold ramp.
gold = "#E3A94B"
goldMid = "#C98F3C"
goldDeep = "#9a6e2e"
goldLight = "#FFE7B6"
# Obsidian surfaces (page = deepest .. raise2 = highest).
page = "#050609"
bgA = "#121318"       # window/stage gradient top
bgB = "#0a0b0e"       # window/stage gradient bottom
panel = "#111217"
panel2 = "#15161c"
raise = "#1b1d24"
raise2 = "#22242c"
line = "#25262e"
lineSoft = "#1b1c22"
hair = "#0e0f13"
# Atmosphere (sheen/shadowInk are base colours — alpha applied at the use
# site; scrim bakes its alpha into #aarrggbb).
sheen = "#FFF0D6"      # warm-white highlight (tab/tile/badge sheens)
shadowInk = "#000000"  # drop-shadows, inset shadows, faux depth
scrim = "#C7080A0D"    # modal scrim dim (alpha 0.78)
goldInk = "#1a1206"    # dark ink painted on gold fills
knob = "#FFF3DF"       # warm-white control knob (Quill toggles/sliders)
