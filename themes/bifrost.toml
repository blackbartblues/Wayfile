# Bifröst — Wayfile's signature theme: a warm tan-gold accent on the shared
# obsidian base. THEMING MODEL: a preset overrides only `accent`. The obsidian
# surfaces, text, file-type and status colours live in the engine default
# (ThemeLoader::s_defaults), and the gold ramp + glow is derived live from the
# accent in src/qml/theme/Theme.qml. So each preset is a one-line accent swap.
[colors]
accent = "#D4AA6A"
